name: 'Tunnel with Logs Saved in Repo'
on: workflow_dispatch

jobs:
  tunnel:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # اجازه می‌دهد workflow به مخزن کامیت کند
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y curl unzip jq

      - name: Download Xray
        run: |
          curl -L -o /tmp/xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -o /tmp/xray.zip -d /tmp/xray
          sudo cp /tmp/xray/xray /usr/local/bin/
          sudo chmod +x /usr/local/bin/xray

      - name: Create Xray config (Shadowsocks+WS)
        run: |
          sudo mkdir -p /usr/local/etc/xray
          cat << 'EOF' | sudo tee /usr/local/etc/xray/ss.json
          {
            "inbounds": [{
              "port": 8001,
              "protocol": "shadowsocks",
              "settings": {"method": "chacha20-ietf-poly1305", "password": "sspass789"},
              "streamSettings": {"network": "ws", "wsSettings": {"path": "/ss"}}
            }],
            "outbounds": [{"protocol": "freedom"}]
          }
          EOF

      - name: Start Xray
        run: |
          sudo /usr/local/bin/xray -c /usr/local/etc/xray/ss.json > /tmp/xray.log 2>&1 &
          sleep 3

      - name: Download cloudflared with retry
        run: |
          for i in 1 2 3; do
            curl -L --retry 3 -o /tmp/cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 && break
            sleep 3
          done
          chmod +x /tmp/cloudflared
          sudo mv /tmp/cloudflared /usr/local/bin/

      - name: Start tunnel and capture all output
        run: |
          /usr/local/bin/cloudflared tunnel --url http://localhost:8001 > /tmp/cf.log 2>&1 &
          CF_PID=$!
          echo "Waiting for tunnel to establish..."
          sleep 15
          # ذخیره لاگ کامل برای مرحله بعد
          cat /tmp/cf.log > /tmp/cf_full.log
          # استخراج URL
          URL=$(grep -oE 'https://[a-z0-9.-]+\.trycloudflare\.com' /tmp/cf.log | head -1)
          echo "TUNNEL_URL=$URL" >> $GITHUB_ENV
          echo "CF_PID=$CF_PID" >> $GITHUB_ENV

      - name: Generate final log file
        run: |
          mkdir -p logs
          TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
          LOGFILE="logs/tunnel_${TIMESTAMP}.txt"
          {
            echo "========================================="
            echo "Tunnel execution log - $(date)"
            echo "========================================="
            echo ""
            echo "--- Xray startup log ---"
            cat /tmp/xray.log 2>/dev/null || echo "No xray log"
            echo ""
            echo "--- Cloudflared log ---"
            cat /tmp/cf_full.log 2>/dev/null || echo "No cloudflared log"
            echo ""
            echo "--- Extracted Tunnel URL ---"
            echo "${{ env.TUNNEL_URL }}"
            echo ""
            if [ -n "${{ env.TUNNEL_URL }}" ]; then
              HOST=$(echo "${{ env.TUNNEL_URL }}" | sed 's|https://||')
              SS_BASE64=$(echo -n "chacha20-ietf-poly1305:sspass789" | base64 -w 0)
              SS_LINK="ss://$SS_BASE64@$HOST:443#GHA-SS"
              echo "--- Working Link ---"
              echo "$SS_LINK"
              echo ""
              echo "Server: $HOST"
              echo "Port: 443"
              echo "Method: chacha20-ietf-poly1305"
              echo "Password: sspass789"
              echo "WebSocket Path: /ss"
              echo "TLS: ON (because cloudflared provides it)"
            else
              echo "--- ERROR: No tunnel URL was found ---"
            fi
            echo "========================================="
          } > "$LOGFILE"
          echo "LOGFILE=$LOGFILE" >> $GITHUB_ENV

      - name: Commit log file to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ env.LOGFILE }}"
          git commit -m "Add tunnel log $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push

      - name: Keep runner alive (6 hours)
        run: sleep 6h
