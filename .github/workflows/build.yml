name: Build EXE and Commit to Repo

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout your empty repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download original source code
        run: |
          curl -L https://github.com/Ariescyn/EldenRing-Save-Manager/archive/refs/heads/master.zip -o master.zip
          unzip master.zip
          # نام پوشه داخل zip: EldenRing-Save-Manager-main
          Move-Item -Path EldenRing-Save-Manager-main -Destination src -Force

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pillow requests pyinstaller

      - name: Build executable
        run: |
          cd src
          pyinstaller --onefile --windowed --icon=./data/icon.ico SaveManager.py

      - name: Copy exe to root
        run: |
          Copy-Item -Path src\dist\SaveManager.exe -Destination .\SaveManager.exe

      - name: Commit and push the exe
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add SaveManager.exe
          git commit -m "Add built SaveManager.exe" || echo "No changes to commit"
          git push
