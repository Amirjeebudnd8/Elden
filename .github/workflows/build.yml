name: 'Create VLESS Tunnel with Full Logging (Fixed Xray)'
on: workflow_dispatch

jobs:
  tunnel:
    runs-on: ubuntu-latest
    steps:
      - name: Print start time
        run: echo "Job started at $(date -u)"

      - name: Install prerequisites (curl, unzip)
        run: sudo apt-get update && sudo apt-get install -y curl unzip

      - name: Download and install Xray binary from GitHub releases
        run: |
          echo "--- Getting latest Xray release ---"
          LATEST_VERSION=$(curl -s https://api.github.com/repos/XTLS/Xray-core/releases/latest | grep -oP '"tag_name": "\K(.*?)(?=")')
          if [ -z "$LATEST_VERSION" ]; then
            echo "Fallback to v1.8.24"
            LATEST_VERSION="v1.8.24"
          fi
          echo "Xray version: $LATEST_VERSION"
          echo "--- Downloading Xray-linux-64.zip ---"
          curl -L -o /tmp/xray.zip "https://github.com/XTLS/Xray-core/releases/download/${LATEST_VERSION}/Xray-linux-64.zip"
          echo "--- Unzipping ---"
          unzip -o /tmp/xray.zip -d /tmp/xray_extract
          echo "--- Installing binary ---"
          sudo cp /tmp/xray_extract/xray /usr/local/bin/
          sudo chmod +x /usr/local/bin/xray
          echo "--- Xray version ---"
          /usr/local/bin/xray -version
          echo "--- Cleanup ---"
          rm -rf /tmp/xray.zip /tmp/xray_extract

      - name: Create Xray config directory
        run: sudo mkdir -p /usr/local/etc/xray

      - name: Write Xray config.json
        run: |
          cat << 'EOF' | sudo tee /usr/local/etc/xray/config.json
          {
            "inbounds": [{
              "listen": "127.0.0.1",
              "port": 2087,
              "protocol": "vless",
              "settings": {
                "clients": [{"id": "b6bdd679-0576-4dbd-b653-bdffdab3bd73", "flow": "xtls-rprx-vision"}],
                "decryption": "none"
              },
              "streamSettings": {
                "network": "ws",
                "wsSettings": {"path": "/"}
              }
            }],
            "outbounds": [{"protocol": "freedom"}]
          }
          EOF
          echo "Config file created:"
          cat /usr/local/etc/xray/config.json

      - name: Start Xray
        run: |
          sudo /usr/local/bin/xray -c /usr/local/etc/xray/config.json &
          sleep 3
          echo "Xray started"

      - name: Download cloudflared
        run: |
          curl -L -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/
          /usr/local/bin/cloudflared --version

      - name: Start tunnel and extract URL
        run: |
          /usr/local/bin/cloudflared tunnel --url http://localhost:2087 > /tmp/cf.log 2>&1 &
          sleep 12
          cat /tmp/cf.log
          TUNNEL_URL=$(grep -oE 'https://[a-zA-Z0-9.-]+\.trycloudflare\.com' /tmp/cf.log | head -1)
          if [ -z "$TUNNEL_URL" ]; then
            echo "ERROR: No tunnel URL"
            exit 1
          fi
          echo "TUNNEL_URL=$TUNNEL_URL" >> $GITHUB_ENV
          HOST=$(echo "$TUNNEL_URL" | sed 's|https://||')
          UUID="b6bdd679-0576-4dbd-b653-bdffdab3bd73"
          VLESS_LINK="vless://${UUID}@${HOST}:443?encryption=none&security=tls&sni=${HOST}&type=ws&host=${HOST}&path=%2F#GHA-Tunnel"
          echo "======================================"
          echo "✅ VLESS link: $VLESS_LINK"
          echo "======================================"
          echo "$VLESS_LINK" > /tmp/link.txt
          sleep 6h
