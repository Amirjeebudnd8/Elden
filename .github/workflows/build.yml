name: 'Multi-Protocol Parallel Tunnels (Test & Choose)'
on: workflow_dispatch

jobs:
  shadowsocks:
    runs-on: ubuntu-latest
    steps:
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y curl unzip jq
      - name: Download Xray
        run: |
          curl -L -o /tmp/xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -o /tmp/xray.zip -d /tmp/xray
          sudo cp /tmp/xray/xray /usr/local/bin/
          sudo chmod +x /usr/local/bin/xray
      - name: Xray config (Shadowsocks+WS)
        run: |
          sudo mkdir -p /usr/local/etc/xray
          sudo tee /usr/local/etc/xray/ss.json > /dev/null <<EOF
          {
            "inbounds": [{
              "port": 8001,
              "protocol": "shadowsocks",
              "settings": {"method": "chacha20-ietf-poly1305", "password": "sspass789"},
              "streamSettings": {"network": "ws", "wsSettings": {"path": "/ss"}}
            }],
            "outbounds": [{"protocol": "freedom"}]
          }
          EOF
      - name: Start Xray
        run: sudo /usr/local/bin/xray -c /usr/local/etc/xray/ss.json &
      - name: Download cloudflared (with retry)
        run: |
          for i in {1..3}; do
            curl -L --retry 3 -o /tmp/cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 && break
            sleep 2
          done
          chmod +x /tmp/cloudflared
          sudo mv /tmp/cloudflared /usr/local/bin/
      - name: Start tunnel and get URL
        run: |
          /usr/local/bin/cloudflared tunnel --url http://localhost:8001 > /tmp/cf.log 2>&1 &
          sleep 15
          URL=$(grep -oE 'https://[a-z0-9.-]+\.trycloudflare\.com' /tmp/cf.log | head -1)
          echo "URL=$URL" >> $GITHUB_ENV
      - name: Generate SS link
        run: |
          HOST=$(echo "$URL" | sed 's|https://||')
          SS_BASE64=$(echo -n "chacha20-ietf-poly1305:sspass789" | base64 -w 0)
          echo "========================================="
          echo "✅ SHADOWSOCKS (try this first)"
          echo "Link: ss://$SS_BASE64@$HOST:443#SS-GHA"
          echo "Manual: server=$HOST, port=443, method=chacha20-ietf-poly1305, password=sspass789, plugin=websocket-tls, path=/ss"
          echo "========================================="
      - name: Keep alive
        run: sleep 6h

  vmess:
    runs-on: ubuntu-latest
    steps:
      - run: sudo apt-get update && sudo apt-get install -y curl unzip jq
      - name: Download Xray
        run: |
          curl -L -o /tmp/xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -o /tmp/xray.zip -d /tmp/xray
          sudo cp /tmp/xray/xray /usr/local/bin/
      - name: Xray config (VMess+WS)
        run: |
          sudo mkdir -p /usr/local/etc/xray
          sudo tee /usr/local/etc/xray/vmess.json > /dev/null <<EOF
          {
            "inbounds": [{
              "port": 8002,
              "protocol": "vmess",
              "settings": {"clients": [{"id": "b6bdd679-0576-4dbd-b653-bdffdab3bd73", "alterId": 0}]},
              "streamSettings": {"network": "ws", "wsSettings": {"path": "/vmess"}}
            }],
            "outbounds": [{"protocol": "freedom"}]
          }
          EOF
      - name: Start Xray
        run: sudo /usr/local/bin/xray -c /usr/local/etc/xray/vmess.json &
      - name: Download cloudflared
        run: |
          curl -L --retry 3 -o /tmp/cf https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x /tmp/cf
          sudo mv /tmp/cf /usr/local/bin/
      - name: Start tunnel
        run: |
          /usr/local/bin/cloudflared tunnel --url http://localhost:8002 > /tmp/cf.log 2>&1 &
          sleep 15
          URL=$(grep -oE 'https://[a-z0-9.-]+\.trycloudflare\.com' /tmp/cf.log | head -1)
          echo "URL=$URL" >> $GITHUB_ENV
      - name: Generate VMess link
        run: |
          HOST=$(echo "$URL" | sed 's|https://||')
          VMESS_JSON="{\"v\":\"2\",\"ps\":\"GHA-VMess\",\"add\":\"$HOST\",\"port\":\"443\",\"id\":\"b6bdd679-0576-4dbd-b653-bdffdab3bd73\",\"aid\":\"0\",\"net\":\"ws\",\"type\":\"none\",\"host\":\"$HOST\",\"path\":\"/vmess\",\"tls\":\"tls\"}"
          VMESS_LINK="vmess://$(echo -n "$VMESS_JSON" | base64 -w 0)"
          echo "========================================="
          echo "✅ VMESS+WS (try if SS fails)"
          echo "Link: $VMESS_LINK"
          echo "========================================="
      - name: Keep alive
        run: sleep 6h

  vless:
    runs-on: ubuntu-latest
    steps:
      - run: sudo apt-get update && sudo apt-get install -y curl unzip
      - name: Download Xray
        run: |
          curl -L -o /tmp/xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -o /tmp/xray.zip -d /tmp/xray
          sudo cp /tmp/xray/xray /usr/local/bin/
      - name: Xray config (VLESS+WS)
        run: |
          sudo mkdir -p /usr/local/etc/xray
          sudo tee /usr/local/etc/xray/vless.json > /dev/null <<EOF
          {
            "inbounds": [{
              "port": 8003,
              "protocol": "vless",
              "settings": {"clients": [{"id": "b6bdd679-0576-4dbd-b653-bdffdab3bd73"}], "decryption": "none"},
              "streamSettings": {"network": "ws", "wsSettings": {"path": "/vless"}}
            }],
            "outbounds": [{"protocol": "freedom"}]
          }
          EOF
      - name: Start Xray
        run: sudo /usr/local/bin/xray -c /usr/local/etc/xray/vless.json &
      - name: Download cloudflared
        run: |
          curl -L --retry 3 -o /tmp/cf https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x /tmp/cf
          sudo mv /tmp/cf /usr/local/bin/
      - name: Start tunnel
        run: |
          /usr/local/bin/cloudflared tunnel --url http://localhost:8003 > /tmp/cf.log 2>&1 &
          sleep 15
          URL=$(grep -oE 'https://[a-z0-9.-]+\.trycloudflare\.com' /tmp/cf.log | head -1)
          echo "URL=$URL" >> $GITHUB_ENV
      - name: Generate VLESS link
        run: |
          HOST=$(echo "$URL" | sed 's|https://||')
          VLESS_LINK="vless://b6bdd679-0576-4dbd-b653-bdffdab3bd73@$HOST:443?encryption=none&security=tls&sni=$HOST&type=ws&host=$HOST&path=%2Fvless#GHA-VLESS"
          echo "========================================="
          echo "✅ VLESS+WS (try last)"
          echo "Link: $VLESS_LINK"
          echo "========================================="
      - name: Keep alive
        run: sleep 6h
