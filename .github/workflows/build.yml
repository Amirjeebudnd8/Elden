name: '✅ Final Working Tunnel for NekoRay (SS+WS)'
on: workflow_dispatch

jobs:
  tunnel:
    runs-on: ubuntu-latest
    steps:
      - name: 📅 Start time
        run: echo "Job started at $(date -u)"

      - name: 📦 Install tools
        run: sudo apt-get update && sudo apt-get install -y curl unzip jq netcat

      - name: ⬇️ Download Xray
        run: |
          LATEST=$(curl -s https://api.github.com/repos/XTLS/Xray-core/releases/latest | jq -r .tag_name)
          curl -L -o /tmp/xray.zip "https://github.com/XTLS/Xray-core/releases/download/${LATEST}/Xray-linux-64.zip"
          unzip -o /tmp/xray.zip -d /tmp/xray
          sudo cp /tmp/xray/xray /usr/local/bin/
          sudo chmod +x /usr/local/bin/xray

      - name: ⚙️ Create Shadowsocks + WebSocket config (no TLS inside)
        run: |
          sudo mkdir -p /usr/local/etc/xray
          cat << 'EOF' | sudo tee /usr/local/etc/xray/config.json
          {
            "log": {"loglevel": "warning"},
            "inbounds": [{
              "listen": "127.0.0.1",
              "port": 9000,
              "protocol": "shadowsocks",
              "settings": {
                "method": "chacha20-ietf-poly1305",
                "password": "sspass123",
                "network": "tcp,udp"
              },
              "streamSettings": {
                "network": "ws",
                "wsSettings": {
                  "path": "/ss"
                }
              }
            }],
            "outbounds": [{"protocol": "freedom"}]
          }
          EOF

      - name: 🚀 Start Xray
        run: |
          sudo /usr/local/bin/xray -c /usr/local/etc/xray/config.json &
          sleep 3
          echo "Xray is running"

      - name: ⬇️ Download cloudflared
        run: |
          curl -L -o /tmp/cf https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x /tmp/cf
          sudo mv /tmp/cf /usr/local/bin/

      - name: 🌐 Start tunnel
        run: |
          /usr/local/bin/cloudflared tunnel --url http://localhost:9000 > /tmp/cf.log 2>&1 &
          sleep 15
          cat /tmp/cf.log
          TUNNEL_URL=$(grep -oE 'https://[a-zA-Z0-9.-]+\.trycloudflare\.com' /tmp/cf.log | head -1)
          if [ -z "$TUNNEL_URL" ]; then exit 1; fi
          HOST=$(echo "$TUNNEL_URL" | sed 's|https://||')
          echo "HOST=$HOST" >> $GITHUB_ENV

      - name: 🔗 Generate NekoRay-compatible link (SIP002 format)
        run: |
          HOST="${{ env.HOST }}"
          PASSWORD="sspass123"
          METHOD="chacha20-ietf-poly1305"
          # SIP002 format: ss://METHOD:PASSWORD@HOST:443?plugin=... 
          # But NekoRay supports standard ss:// without plugin for WS
          # Better to output manual config
          echo "=================================================="
          echo "✅ TUNNEL ACTIVE. Use these settings in NekoRay:"
          echo ""
          echo "Server Address: $HOST"
          echo "Port: 443"
          echo "Protocol: Shadowsocks"
          echo "Method: $METHOD"
          echo "Password: $PASSWORD"
          echo "Plugin: none (or websocket-tls)"
          echo "WebSocket Path: /ss"
          echo "TLS: Enabled (because cloudflared provides TLS)"
          echo ""
          echo "Or use this ss:// link (may work directly):"
          SS_LINK="ss://$(echo -n "$METHOD:$PASSWORD" | base64 -w 0)@$HOST:443#GHA-SS"
          echo "$SS_LINK"
          echo ""
          echo "🌐 Also test in browser: ${{ env.TUNNEL_URL }}/ss"
          echo "=================================================="

      - name: ⏰ Keep alive
        run: sleep 6h
