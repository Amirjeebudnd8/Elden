name: 'Create VLESS Tunnel and Config'

on:
  workflow_dispatch:  # یعنی با یه کلیک روی دکمه، کار اجرا بشه

jobs:
  tunnel:
    runs-on: ubuntu-latest
    steps:
      - name: Install xray
        run: |
          bash -c "$(curl -L https://github.com/XTLS/Xray-install/raw/main/install-release.sh)" @ install
          
      - name: Generate Xray config
        run: |
          mkdir -p ~/.config
          cat << 'EOF' > ~/.config/config.json
          {
            "inbounds": [
              {
                "port": 2087,
                "protocol": "vless",
                "settings": {
                  "clients": [
                    {
                      "id": "b6bdd679-0576-4dbd-b653-bdffdab3bd73",
                      "flow": "xtls-rprx-vision"
                    }
                  ],
                  "decryption": "none"
                },
                "streamSettings": {
                  "network": "ws",
                  "security": "none",
                  "wsSettings": {
                    "path": "/"
                  }
                }
              }
            ],
            "outbounds": [
              {
                "protocol": "freedom",
                "tag": "direct"
              }
            ]
          }
          EOF
          cat ~/.config/config.json
          
      - name: Setup cloudflared
        uses: cloudflared/setup-cloudflared@v1
          
      - name: Start tunnel and generate VLESS link
        run: |
          # Start cloudflared tunnel in background
          cloudflared tunnel --url http://localhost:2087 > cloudflared.log 2>&1 &
          CF_PID=$!
          
          # Wait for tunnel to be ready
          echo "Waiting for tunnel to be ready..."
          sleep 10
          
          # Extract tunnel URL from logs
          TUNNEL_URL=$(grep -o 'https://[-a-zA-Z0-9.]*trycloudflare.com' cloudflared.log | head -1)
          
          if [ -z "$TUNNEL_URL" ]; then
            echo "❌ Failed to get tunnel URL"
            cat cloudflared.log
            exit 1
          fi
          
          echo "✅ Tunnel URL: $TUNNEL_URL"
          TUNNEL_HOST=$(echo "$TUNNEL_URL" | sed 's|https://||')
          UUID="b6bdd679-0576-4dbd-b653-bdffdab3bd73"  # should match the UUID in config.json
          
          VLESS_LINK="vless://${UUID}@${TUNNEL_HOST}:443?encryption=none&security=tls&sni=${TUNNEL_HOST}&type=ws&host=${TUNNEL_HOST}&path=%2F#GitHub-Actions-Tunnel"
          
          # Print final link
          echo "=============================================================================="
          echo "🌐 Your VLESS configuration link:"
          echo "$VLESS_LINK"
          echo "=============================================================================="
          
          # Keep tunnel alive
          wait $CF_PID
