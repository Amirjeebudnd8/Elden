name: Build EXE and Commit to Repo

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write  # اجازه commit و push به مخزن

    steps:
      # 1. کلون کردن مخزن خالی خودتان (برای اینکه بعداً exe را commit کنید)
      - name: Checkout your empty repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. دانلود کدهای اصلی از ریپوی Ariescyn
      - name: Download original source code
        run: |
          curl -L https://github.com/Ariescyn/EldenRing-Save-Manager/archive/refs/heads/master.zip -o master.zip
          unzip master.zip
          move EldenRing-Save-Manager-master src

      # 3. نصب پایتون
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 4. نصب پیش‌نیازها
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pillow requests pyinstaller

      # 5. ساخت فایل exe
      - name: Build executable
        run: |
          cd src
          pyinstaller --onefile --windowed --icon=./data/icon.ico SaveManager.py

      # 6. کپی فایل exe به ریشه مخزن شما
      - name: Copy exe to root
        run: |
          copy src\dist\SaveManager.exe .\SaveManager.exe

      # 7. commit و push کردن فایل exe به مخزن شما
      - name: Commit and push the exe
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add SaveManager.exe
          git commit -m "Add built SaveManager.exe" || echo "No changes to commit"
          git push
