name: Build EXE with Data Folder (Zipped)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout your empty repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download original source code
        run: |
          curl -L https://github.com/Ariescyn/EldenRing-Save-Manager/archive/refs/heads/master.zip -o master.zip
          unzip master.zip
          Move-Item -Path EldenRing-Save-Manager-main -Destination src -Force

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pillow requests pyinstaller

      - name: Build executable
        run: |
          cd src
          pyinstaller --onefile --windowed --icon=./data/icon.ico SaveManager.py

      - name: Prepare release package (exe + data folder)
        run: |
          New-Item -ItemType Directory -Force release_package
          Copy-Item src\dist\SaveManager.exe release_package\
          Copy-Item -Recurse src\data release_package\data
          Compress-Archive -Path release_package\* -Destination EldenRingSaveManager.zip

      - name: Copy zip to repository root
        run: |
          Copy-Item EldenRingSaveManager.zip .\EldenRingSaveManager.zip

      - name: Commit and push the zip file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add EldenRingSaveManager.zip
          git commit -m "Add EldenRingSaveManager.zip with exe and data" || echo "No changes to commit"
          git push
